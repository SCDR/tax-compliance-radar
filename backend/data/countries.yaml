countries:
- code: TH
  name: 泰国
  currency: THB
  currency_symbol: 泰铢
  tax_type: VAT
  tax_rate: 7.0
  registration_threshold: 1800000
  language: zh
  business_types:
  - 跨境电商零售
  - 品牌出海直营
  - 外贸综合服务
  platforms:
  - Shopee
  - Lazada
  - TikTok Shop
  business_fields:
  - name: annual_sales
    label: 年预计销售额
    type: number
    required: true
    placeholder: 请输入年销售额（泰铢）
    min_value: 0
    max_value: 1000000000000
  - name: platforms
    label: 入驻平台
    type: multiselect
    options:
    - Shopee
    - Lazada
    - TikTok Shop
  - name: product_categories
    label: 商品类目
    type: multiselect
    options:
    - 电子产品
    - 服饰
    - 美妆
    - 家居
    - 食品
  - name: monthly_orders
    label: 月均订单量
    type: number
    placeholder: 请输入月均订单量
    min_value: 0
  - name: warehousing_mode
    label: 仓储模式
    type: select
    options:
    - 本地仓
    - 海外仓
    - 直邮
  - name: has_local_entity
    label: 是否有本地公司主体
    type: select
    options:
    - 是
    - 否
  flag: 🇹🇭
